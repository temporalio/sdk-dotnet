name: C++ SDK CI

on:
  push:
    branches:
      - main
      - cpp-conversion
    paths:
      - "cpp/**"
      - ".github/workflows/cpp-ci.yml"
  pull_request:
    paths:
      - "cpp/**"
      - ".github/workflows/cpp-ci.yml"

permissions:
  actions: read
  contents: read

env:
  # Shared protoc version across all jobs
  PROTOC_VERSION: "23.x"

jobs:
  # ── Windows (MSVC 2022 + Ninja) ────────────────────────────────────────────
  windows-msvc:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: choco install ninja -y

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/Temporalio/Bridge/sdk-core

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: cpp/build/_deps
          key: fetchcontent-msvc-ninja-${{ hashFiles('cpp/CMakeLists.txt', 'cpp/tests/CMakeLists.txt') }}
          restore-keys: fetchcontent-msvc-ninja-

      - name: Configure CMake (Ninja)
        run: >
          cmake -B cpp/build -S cpp
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DTEMPORALIO_BUILD_EXTENSIONS=OFF
          -DTEMPORALIO_BUILD_EXAMPLES=ON

      - name: Build library
        run: cmake --build cpp/build --target temporalio

      - name: Build tests
        run: cmake --build cpp/build --target temporalio_tests

      - name: Build examples
        run: cmake --build cpp/build

      - name: Run tests
        run: ctest --test-dir cpp/build --output-on-failure --timeout 120

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows-msvc
          path: cpp/build/Testing/
          if-no-files-found: ignore

  # ── Linux (GCC + coverage, Clang + ASan/UBSan) ────────────────────────────
  # NOTE: GCC 13+ is required — GCC 12 has coroutine codegen bugs that cause
  # heap corruption during normal workflow execution (timers, signals, activities).
  linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gcc
            cc: gcc-13
            cxx: g++-13
            packages: "gcc-13 g++-13 ninja-build lcov"
            cmake_cxx_flags: "--coverage -fprofile-arcs -ftest-coverage"
            cmake_linker_flags: "--coverage"
            test_timeout: 120
            collect_coverage: true
          - name: clang-asan
            cc: clang-18
            cxx: clang++-18
            packages: "clang-18 ninja-build"
            cmake_cxx_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer"
            cmake_linker_flags: "-fsanitize=address,undefined"
            test_timeout: 180
            collect_coverage: false
    name: linux (${{ matrix.name }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/Temporalio/Bridge/sdk-core
          key: ${{ matrix.name }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: cpp/build/_deps
          key: fetchcontent-${{ matrix.name }}-${{ hashFiles('cpp/CMakeLists.txt', 'cpp/tests/CMakeLists.txt') }}
          restore-keys: fetchcontent-${{ matrix.name }}-

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -B cpp/build -S cpp
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="${{ matrix.cmake_cxx_flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.cmake_linker_flags }}"
          -DTEMPORALIO_BUILD_EXTENSIONS=OFF
          -DTEMPORALIO_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build cpp/build

      - name: Run tests
        env:
          ASAN_OPTIONS: ${{ !matrix.collect_coverage && 'detect_leaks=1:halt_on_error=1' || '' }}
          UBSAN_OPTIONS: ${{ !matrix.collect_coverage && 'print_stacktrace=1:halt_on_error=1' || '' }}
        run: ctest --test-dir cpp/build --output-on-failure --timeout ${{ matrix.test_timeout }}

      - name: Collect coverage
        if: matrix.collect_coverage
        run: |
          lcov --capture --directory cpp/build --output-file coverage.info \
               --gcov-tool gcov-13 \
               --ignore-errors mismatch
          # Remove system headers and third-party code from coverage
          lcov --remove coverage.info \
               '/usr/*' \
               '*/build/_deps/*' \
               '*/tests/*' \
               --output-file coverage_filtered.info \
               --ignore-errors unused
          lcov --list coverage_filtered.info

      - name: Upload coverage artifact
        if: matrix.collect_coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_filtered.info

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux-${{ matrix.name }}
          path: cpp/build/Testing/
          if-no-files-found: ignore

  # ── Linux (GCC 13 + vcpkg) ─────────────────────────────────────────────────
  linux-vcpkg:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 ninja-build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/Temporalio/Bridge/sdk-core

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 66c0373dc7fca549e5803087b9487edfe3aca0a1

      - name: Configure CMake (vcpkg preset)
        env:
          CC: gcc-13
          CXX: g++-13
        run: >
          cmake --preset debug -S cpp
          -DTEMPORALIO_BUILD_EXTENSIONS=OFF

      - name: Build
        run: cmake --build cpp/build/debug

      - name: Run tests
        run: ctest --test-dir cpp/build/debug --output-on-failure --timeout 120

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux-vcpkg
          path: cpp/build/debug/Testing/
          if-no-files-found: ignore

  # ── CMake Install + find_package Verification (Linux) ──────────────────────
  install-verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 ninja-build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/Temporalio/Bridge/sdk-core

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: cpp/build/_deps
          key: fetchcontent-gcc13-install-${{ hashFiles('cpp/CMakeLists.txt', 'cpp/tests/CMakeLists.txt') }}
          restore-keys: fetchcontent-gcc13-install-

      - name: Configure CMake
        env:
          CC: gcc-13
          CXX: g++-13
        run: >
          cmake -B cpp/build -S cpp
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          -DTEMPORALIO_BUILD_TESTS=OFF
          -DTEMPORALIO_BUILD_EXTENSIONS=OFF
          -DTEMPORALIO_BUILD_EXAMPLES=OFF

      - name: Build and install
        run: |
          cmake --build cpp/build
          cmake --install cpp/build

      - name: Verify installed files
        run: |
          echo "=== Installed headers ==="
          ls -R ${{ github.workspace }}/install/include/temporalio/ | head -30
          echo "=== Installed libraries ==="
          ls -la ${{ github.workspace }}/install/lib/
          echo "=== Installed cmake config ==="
          ls -la ${{ github.workspace }}/install/lib/cmake/temporalio/ 2>/dev/null || echo "No cmake config (expected when deps from FetchContent)"
          echo "=== Installed pkgconfig ==="
          ls -la ${{ github.workspace }}/install/lib/pkgconfig/
